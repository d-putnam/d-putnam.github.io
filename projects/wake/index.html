<!DOCTYPE html>
<html lang="en">
    <head>
        <!--Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!--Bootstrap CSS -->
        <link rel="stylesheet" 
              href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
              integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" 
              crossorigin="anonymous">
        <!--Link fonts + styles -->
        <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../css/styles.css">
        <link rel="shortcut icon" href="../../favicon.ico">
        <title>dan putnam - wake</title>
    </head>
    <body>
        <div class="header">
            <ul class="nav">
                <li id="logo_block" class="nav-item">
                    <a class="logo" href="../..">dan|putnam</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="../..">Work</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="../../about">About</a>
                </li>
            </ul>
        </div>
        <div class="content">
            <div class="col-11" style="max-width: 780px">
                <p>wake (2014)<br>
                    13 minutes, 17 seconds<br>
                    Exerpt from the <a href="https://dputnam.bandcamp.com/album/wake" target="blank">album</a> of the same name
                </p>
                <p>Mixed instrumentation: extended bass guitar, modular synthesis, radio, microphones, speakers, voice, and live looping.</p>
                <iframe style="border: 0; width: 100%; height: 120px;" src="https://bandcamp.com/EmbeddedPlayer/album=4092854980/size=large/bgcol=333333/linkcol=ffffff/tracklist=false/artwork=small/track=1474196486/transparent=true/" seamless>
                    <a href="https://dputnam.bandcamp.com/album/wake">wake by d putnam</a></iframe>
            </div>

        </div>
        <!--Gradient background -->
        <div id="background-wrap">
            <div id="background">
                <svg viewBox="0 0 200 200"
                        xmlns="http://www.w3.org/2000/svg"
                        xmlns:xlink="http://www.w3.org/1999/xlink" >
                    <defs>
                        <linearGradient id="gradient" gradientTransform="rotate(100 .5 .5)">
                            <animateTransform attributeName="gradientTransform" 
                                                id="spin"
                                                attributeType="XML"
                                                type="rotate"
                                                from="100 .5 .5"
                                                to="460 .5 .5"
                                                dur="35s"
                                                repeatCount="indefinite" />
                            <stop id="stop1" offset="0" stop-color="rgba(35, 137, 89, 0.2)"/>
                            <stop id="stop2" offset=".3" stop-color="rgba(59, 13, 93, 0.2)">
                                <animate attributeName="offset" 
                                         id="breath" 
                                         dur="40s" 
                                         values="0.40; 0.50; 0.40" 
                                         repeatCount="indefinite"></animate>
                            </stop>
                            <stop id="stop3" offset="1" stop-color="rgba(13, 8, 32, 0.2)"/>     
                        </linearGradient> 
                    </defs>
                    <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
                </svg>
            </div>
        </div>
        <!--Include jQuery -->
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" 
                integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" 
                crossorigin="anonymous"></script> 
        <!--Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous"></script>
        <!--Custom JS -->
        <script src="../../js/scripts.js"></script>
        <script>
            // Disable the carousel cycling
            $("#carouselvideo").carousel({interval: false});
            // On link hover, go dark
            $("a").hover(
                function() {
                    $(this).css("color", colors[4]);  
                }, function() {
                    $(this).css("color", colors[5]);  
                }
            );
            // On hover, cycle text color through slightly more
            // saturated versions of the background colors
            let hover = false;
            $(".logo").hover(
                async function() {
                    hover = true;
                    let i = 0;
                    while (hover === true) {
                        $(this).css("color", colors[i+6]);
                        i++;
                        if (i === 5) {
                            i = 0;
                        }
                        await sleep(100);
                    };
                    $(this).css("color", "#252525");
                }, function(){
                hover = false;
                }
            );
        </script>
    </body>
</html>
