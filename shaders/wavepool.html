    <script id="sliders">
      const scale = (inputY, yRange, xRange) => {
        const [xMin, xMax] = xRange;
        const [yMin, yMax] = yRange;
        console.log(xRange)

        const percent = (inputY - yMin) / (yMax - yMin);
        const outputX = percent * (xMax - xMin) + xMin;

        return outputX;
      };

      document.querySelectorAll('input').forEach(input => {
        //do something
        input.oninput = function() {
          const yRange = [Number(0), Number(5000)]
          const xRange = [Number(input.dataset.min), input.dataset.max -1]
          const value = scale(input.value, yRange, xRange);
          const target = input.dataset.target;
          console.log(`input ${input.value} / 1500`)
          console.log(`output ${value / 10.0} / ${input.dataset.max}`)



          material.uniforms[target].value = value / 10.0;
        };
      });


    </script>
    <script type="x-shader/x-fragment" id="fShader">
      uniform float u_time;
      uniform vec2 u_resolution;
      uniform vec2 u_mouse;
      uniform float u_sliderOne;
      uniform float u_sliderTwo;
      uniform float u_sliderThree;
      uniform float u_sliderFour;
      uniform float u_sliderFive;
      uniform float u_sliderSix;
      uniform float u_sliderSeven;
      uniform float u_sliderEight;
      uniform float u_sliderNine;
      uniform float u_sliderTen;
      uniform float u_sliderEleven;


  
      void main(){
        vec2 coord = 6.0 * gl_FragCoord.xy / u_resolution;
  
        for(int i = 1; i < 4; i++) {
          float n = float(i);
          coord += vec2(u_sliderNine / n * sin(n * coord.y + (u_time / 200.0) + 0.3 * n) + 0.8, 0.4 / n * sin(coord.x + (u_time / 120.0) + 0.3 * n) + 1.6);
        }
  
        vec3 color = vec3(0.5 * sin(coord.x) + 0.8, 0.5 * sin(coord.y) + u_sliderTen, sin(coord.x + coord.y));
        color += sin(coord.y * cos(u_time / u_sliderOne) * u_sliderTwo) + u_sliderEleven + sin(coord.y * cos(u_time / u_sliderThree) * u_sliderFour);
        color += sin(coord.x * sin(u_time / u_sliderFive) * u_sliderSix) + cos(coord.x * cos(u_time / u_sliderSeven) * u_sliderEight) + 0.2;
  
        gl_FragColor = vec4(color, 1.20);
      }
    </script>
    <script type="x-shader/x-vertex" id="vShader">
      varying vec2 v_uv;

      void main() {
        v_uv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  
      }
    </script>
		<script>
    // GLSL \/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\
    const vShader = document.querySelector('#vShader').innerHTML;
    const fShader = document.querySelector('#fShader').innerHTML;

    // shader uniforms
    // [120, 10, 120, 10, 120, 20, 120, 40, 0.5, -0.5, -0.5]
    let uniforms = {
      u_mouse: { value: { x: window.innerWidth / 2, y: window.innerHeight / 2 } },
      u_resolution: { value: { x: window.innerWidth, y: window.innerHeight } },
      u_time: { value: 0.0 },
      u_color: { value: new THREE.Color(0xFF0000) },
      u_sliderOne: { value: 26.68 },
      u_sliderTwo: { value: 25.11 },
      u_sliderThree: { value: 43.66 },
      u_sliderFour: { value: 187.21 },
      u_sliderFive: { value: 74.25 },
      u_sliderSix: { value: 172.77 },
      u_sliderSeven: { value: 28.044 },
      u_sliderEight: { value: 143.05 },
      u_sliderNine: { value: 1.03 },
      u_sliderTen: { value: -1.06 },
      u_sliderEleven: { value: -1.095 },
    }

    // THREE.JS \/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\
    const scene = new THREE.Scene();
    const clock = new THREE.Clock();

    // camera
    let aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.PerspectiveCamera( 15, aspect, 1, 1000 );
    camera.position.z = 10;

    // renderer
    const renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: true,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // geometry and material
		const geometry = new THREE.PlaneGeometry( window.screen.width, window.screen.height, 32 );
    const material = new THREE.ShaderMaterial({
      vertexShader: vShader,
      fragmentShader: fShader,
      uniforms
    });

    // mesh
    var plane = new THREE.Mesh( geometry, material );
    scene.add( plane );

    // render
    function render() {
      // update time uniform
      uniforms.u_time.value = clock.getElapsedTime();
      // animation loop
      requestAnimationFrame( render );
      renderer.render( scene, camera );
    }


    // EVENT LISTENERS \/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\
    // mousemove
    document.addEventListener('mousemove', (e) => {
      uniforms.u_mouse.value.x = e.clientX;
      uniforms.u_mouse.value.y = e.clientY;
    })
    // window resize
    const onWindowResize = () => {
      const aspectRatio = window.innerWidth/window.innerHeight;
      let width, height;
      if (aspectRatio >= 1) {
        width = 1;
        height = (window.innerHeight/window.innerWidth) * width;
      } else {
        width = aspectRatio;
        height = 1;
      }
      camera.left = -width;
      camera.right = width;
      camera.top = height;
      camera.bottom = -height;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (uniforms.u_resolution !== undefined) {
        uniforms.u_resolution.value.x = window.innerWidth;
        uniforms.u_resolution.value.y = window.innerHeight;
      }
    }
    window.onresize = onWindowResize;

    // run everything
    render();
    </script>
	</body>
